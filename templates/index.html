<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Premium Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f0f0f; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-red-600 mb-6 text-center">Premium YT Downloader</h1>
        
        <div class="flex gap-2 mb-8">
            <input id="searchInput" type="text" placeholder="Search video..." class="w-full p-3 rounded-lg bg-zinc-900 border border-zinc-800 outline-none">
            <button onclick="search()" class="bg-red-600 px-6 py-3 rounded-lg font-bold">Search</button>
        </div>

        <div id="videoGrid" class="grid gap-4">
            </div>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p class="text-center">Searching...</p>';
            
            const res = await fetch('/api/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query})
            });
            const videos = await res.json();
            
            grid.innerHTML = '';
            videos.forEach(v => {
                grid.innerHTML += `
                    <div class="glass p-3 rounded-xl flex gap-3 cursor-pointer" onclick="getFormats('${v.videoId}')">
                        <img src="${v.thumbnail}" class="w-32 rounded-lg">
                        <div>
                            <h3 class="text-sm font-semibold line-clamp-2">${v.title}</h3>
                            <p class="text-xs text-zinc-400 mt-1">${v.channel}</p>
                        </div>
                    </div>
                `;
            });
        }

        async function getFormats(id) {
            alert('Loading formats... Please wait.');
            const res = await fetch('/api/get_formats', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({videoId: id})
            });
            const data = await res.json();
            console.log(data);
            alert('Title: ' + data.title + '\nCheck console for all links!');
        }
    </script>
</body>
</html>
