<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium YT Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #222; }
        .v-card { transition: 0.3s; border: 1px solid #1a1a1a; }
        .v-card:active { transform: scale(0.97); }
        .quality-btn { background: #1a1a1a; border: 1px solid #333; padding: 6px 14px; border-radius: 8px; font-size: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="glass sticky top-0 z-50 p-4 flex items-center justify-between">
        <div class="flex items-center gap-1 text-red-600 font-black text-xl italic">
            <i class="fa-brands fa-youtube text-2xl"></i> PREMIUM
        </div>
        <div class="flex-1 max-w-sm mx-4 relative">
            <input id="q" type="text" placeholder="Search videos..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-full py-2 px-5 text-sm outline-none focus:border-red-600">
            <button onclick="search()" class="absolute right-4 top-2.5 text-zinc-500">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-pink-500"></div>
    </header>

    <div id="playerBox" class="hidden sticky top-[73px] z-40 bg-black">
        <div class="aspect-video w-full bg-zinc-900">
            <video id="mainVideo" controls autoplay playsinline class="w-full h-full"></video>
        </div>
        <div class="p-4 bg-zinc-900/50">
            <h2 id="videoTitle" class="text-sm font-bold line-clamp-2 mb-4">Loading...</h2>
            <div class="space-y-4">
                <div>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-2">Video Quality</p>
                    <div id="vOptions" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
                </div>
                <div>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-2">Audio Only</p>
                    <div id="aOptions" class="flex gap-2 overflow-x-auto no-scrollbar"></div>
                </div>
            </div>
        </div>
    </header>

    <main id="feed" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
        <div class="col-span-full text-center py-20 text-zinc-700">
            <i class="fa-solid fa-bolt text-5xl mb-4"></i>
            <p>Type something to search...</p>
        </div>
    </main>

    <script>
        // পেজ লোড হলে ডিফল্ট সার্চ
        window.onload = () => { search('trending bangla'); };

        async function search(val) {
            const query = val || document.getElementById('q').value;
            if(!query) return;

            const feed = document.getElementById('feed');
            feed.innerHTML = '<p class="col-span-full text-center text-zinc-500">Searching YouTube...</p>';

            const res = await fetch('/api/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query: query})
            });
            const videos = await res.json();

            feed.innerHTML = '';
            if(videos.length === 0) {
                feed.innerHTML = '<p class="col-span-full text-center text-red-500">No videos found. Check API Key.</p>';
                return;
            }

            videos.forEach(v => {
                feed.innerHTML += `
                    <div class="v-card rounded-2xl overflow-hidden bg-zinc-900/30" onclick="playVideo('${v.videoId}', '${v.title.replace(/'/g, "")}')">
                        <img src="${v.thumbnail}" class="w-full aspect-video object-cover">
                        <div class="p-3">
                            <h3 class="text-xs font-semibold line-clamp-2">${v.title}</h3>
                            <p class="text-[10px] text-zinc-500 mt-1">${v.channel}</p>
                        </div>
                    </div>
                `;
            });
        }

        async function playVideo(id, title) {
            document.getElementById('playerBox').classList.remove('hidden');
            document.getElementById('videoTitle').innerText = title;
            window.scrollTo({top: 0, behavior: 'smooth'});

            const vOptions = document.getElementById('vOptions');
            const aOptions = document.getElementById('aOptions');
            vOptions.innerHTML = '...';
            aOptions.innerHTML = '...';

            const res = await fetch('/api/get_formats', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({videoId: id})
            });
            const data = await res.json();

            if(data.playUrl) {
                const video = document.getElementById('mainVideo');
                video.src = data.playUrl;
                video.play();
            }

            vOptions.innerHTML = data.video.map(f => `
                <div class="flex flex-col gap-1">
                    <button onclick="changeSource('${f.url}')" class="quality-btn text-blue-400">Play ${f.quality}</button>
                    <a href="${f.url}" download class="quality-btn text-center text-green-500"><i class="fa-solid fa-download"></i></a>
                </div>
            `).join('');

            aOptions.innerHTML = data.audio.map(f => `
                <a href="${f.url}" target="_blank" class="quality-btn text-orange-400"><i class="fa-solid fa-music mr-1"></i> ${f.quality}</a>
            `).join('');
        }

        function changeSource(url) {
            const v = document.getElementById('mainVideo');
            const currentTime = v.currentTime;
            v.src = url;
            v.currentTime = currentTime;
            v.play();
        }

        // Enter key press search
        document.getElementById('q').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') search();
        });
    </script>
</body>
</html>
